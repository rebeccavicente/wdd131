<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Miami</title>

    <meta name="description" content="Explore Miami, Florida, including its population, geography, climate, and current weather information.">
    <meta name="author" content="Rebecca Vicente">

    <link rel="stylesheet" href="styles/place.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

<header>
    <h1>Miami</h1>
</header>

<main>

<picture>
    <source media="(max-width: 600px)" srcset="images/miami-small.webp">
    <source media="(max-width: 900px)" srcset="images/miami-medium.webp">
    <img src="images/miami-large.webp" alt="Miami Skyline">
</picture>

<section class="data">

    <h2>Data</h2>

    <p><strong>State:</strong> Florida</p>
    <p><strong>Population:</strong> 455,924</p>
    <p><strong>Area:</strong> 56 sq mi</p>
    <p><strong>Language:</strong> English, Spanish</p>
    <p><strong>Currency:</strong> US Dollar</p>
    <p><strong>Time Zone:</strong> UTC -5</p>
    <p><strong>Elevation:</strong> 6 ft</p>

</section>

<section class="weather">

    <h2>Weather</h2>

    <img src="images/sun.svg" alt="Weather Icon" class="mobile-icon">

   <p><strong>Temperature:</strong> <span id="temp">30</span> °C</p>

    <p><strong>Conditions:</strong> Sunny</p>

    <p><strong>Wind:</strong> <span id="wind">12</span> km/h</p>

    <p><strong>Wind Chill:</strong>
        <span id="windchill"></span>
    </p>

</section>

</main>

<footer>

    <p>
        &copy;
        <span id="currentyear"></span>
        🌴 Rebecca Vicente 🌴 Miami
    </p>

    <p id="lastModified"></p>

</footer>

</body>
</html>
